<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shine Photobooth</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  scroll-behavior: smooth;
}

/* NAVBAR */
nav {
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  padding: 10px 20px;
  border-radius: 30px;
  z-index: 1000;
}

nav a {
  margin: 0 8px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.box {
  width: 100%;
  max-width: 1100px;
  background: #f8d7da;
  border-radius: 25px;
  padding: 40px;
  position: relative;
  text-align: center;
  overflow: hidden;
  cursor: pointer;
}

/* BLUR */
.box::before {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, #ff4d6d, transparent);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(90px);
}

/* TEXT */
.box h1 {
  font-size: 40px;
  position: relative;
}

.box p {
  margin-top: 10px;
  opacity: 0.7;
  position: relative;
}

/* FLOAT FOTO */
.photo {
  position: absolute;
  width: 120px;
  border-radius: 10px;
  animation: float 4s ease-in-out infinite;
}

.left {
  left: 20px;
  top: 50%;
  transform: translateY(-50%) rotate(-10deg);
}

.right {
  right: 20px;
  top: 50%;
  transform: translateY(-50%) rotate(10deg);
}

@keyframes float {
  0%,100% { transform: translateY(-50%) translateY(0); }
  50% { transform: translateY(-50%) translateY(-15px); }
}

/* SECTION */
section {
  padding: 80px 20px;
  text-align: center;
}

/* GALLERY */
#portfolio {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

#portfolio img {
  width: 45%;
  max-width: 220px;
  margin: 10px;
  border-radius: 10px;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 2000;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal img {
  width: 90%;
  margin: 100px auto;
  display: block;
}

.modal:target {
  display: block;
}

/* PRICELIST */
.pricing {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #eee;
  padding: 20px;
  margin: 10px;
  border-radius: 10px;
  width: 250px;
}

/* CONTACT */
.contact a {
  display: block;
  margin: 10px;
}

/* MOBILE */
@media (max-width: 768px) {
  .photo {
    display: none;
  }

  .box h1 {
    font-size: 28px;
  }

  #portfolio img {
    width: 80%;
  }
}
</style>

</head>

<body>

<nav>
  <a href="#home">Home</a>
  <a href="#portfolio">Portfolio</a>
  <a href="#pricelist">Pricelist</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO KLIK KE WA -->
<div class="hero" id="home">
  <a href="https://wa.me/6283894036552" style="text-decoration:none; color:inherit;">
    <div class="box">

      <img src="1.jpg" class="photo left">
      <img src="2.jpg" class="photo right">

      <h1>Shine Photobooth</h1>
      <p>Klik di sini untuk booking via WhatsApp ✨</p>

    </div>
  </a>
</div>

<section id="portfolio">
  <h2>Portfolio</h2>

  <a href="#img1"><img src="1.jpg"></a>
  <a href="#img2"><img src="2.jpg"></a>
  <a href="#img3"><img src="3.jpg"></a>

  <div id="img1" class="modal"><img src="1.jpg"></div>
  <div id="img2" class="modal"><img src="2.jpg"></div>
  <div id="img3" class="modal"><img src="3.jpg"></div>
</section>

<section id="pricelist" class="pricing">
  <div class="card">
    <h3>Basic</h3>
    <p>Rp 500K</p>
  </div>

  <div class="card">
    <h3>Premium</h3>
    <p>Rp 1.000K</p>
  </div>
</section>

<section id="contact" class="contact">
  <h2>Contact</h2>

  <a href="https://wa.me/6283894036552">WhatsApp</a>
  <a href="https://www.instagram.com/shine.photostudio_id">Instagram</a>
  <a href="https://www.tiktok.com/@shine.photostudio_id">TikTok</a>
</section>

</body>
</html>
