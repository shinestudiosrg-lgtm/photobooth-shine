<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shine Photobooth</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  scroll-behavior: smooth;
}

/* NAVBAR */
nav {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  padding: 10px 25px;
  border-radius: 30px;
  z-index: 1000;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  width: 90%;
  max-width: 1100px;
  background: #f8d7da;
  border-radius: 25px;
  padding: 60px;
  position: relative;
  text-align: center;
  overflow: hidden;
}

/* BLUR EFFECT */
.box::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, #ff4d6d, transparent);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(100px);
}

/* TEXT */
.box h1 {
  font-size: 50px;
  position: relative;
}

.start-btn {
  margin-top: 20px;
  display: inline-block;
  padding: 12px 30px;
  background: #ff4d6d;
  color: white;
  border-radius: 30px;
  text-decoration: none;
}

/* FLOATING FOTO */
.photo {
  position: absolute;
  width: 150px;
  border-radius: 10px;
  animation: float 4s ease-in-out infinite;
}

.left {
  left: 30px;
  top: 50%;
  transform: translateY(-50%) rotate(-10deg);
}

.right {
  right: 30px;
  top: 50%;
  transform: translateY(-50%) rotate(10deg);
}

@keyframes float {
  0%,100% { transform: translateY(-50%) translateY(0); }
  50% { transform: translateY(-50%) translateY(-20px); }
}

/* SECTION */
section {
  padding: 100px 20px;
  text-align: center;
}

/* GALLERY */
#portfolio img {
  width: 220px;
  margin: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

#portfolio img:hover {
  transform: scale(1.1);
}

/* MODAL ZOOM */
.modal {
  display: none;
  position: fixed;
  z-index: 2000;
  padding-top: 100px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal img {
  margin: auto;
  display: block;
  width: 80%;
}

.modal:target {
  display: block;
}

/* PRICELIST */
.card {
  background: #eee;
  padding: 20px;
  margin: 10px;
  display: inline-block;
  border-radius: 10px;
}

/* CONTACT */
.contact a {
  display: block;
  margin: 10px;
  font-size: 18px;
}
</style>

</head>

<body>

<nav>
  <a href="#home">Home</a>
  <a href="#portfolio">Portfolio</a>
  <a href="#pricelist">Pricelist</a>
  <a href="#contact">Contact</a>
</nav>

<div class="hero" id="home">
  <div class="box">

    <img src="1.jpg" class="photo left">
    <img src="2.jpg" class="photo right">

    <h1>Shine Photobooth</h1>
    <p>Capture Your Best Moment ✨</p>

    <a href="#contact" class="start-btn">START</a>

  </div>
</div>

<section id="portfolio">
  <h2>Portfolio</h2>

  <a href="#img1"><img src="1.jpg"></a>
  <a href="#img2"><img src="2.jpg"></a>
  <a href="#img3"><img src="3.jpg"></a>

  <!-- MODAL -->
  <div id="img1" class="modal"><img src="1.jpg"></div>
  <div id="img2" class="modal"><img src="2.jpg"></div>
  <div id="img3" class="modal"><img src="3.jpg"></div>
</section>

<section id="pricelist">
  <h2>Pricelist</h2>

  <div class="card">
    <h3>Basic</h3>
    <p>Rp 500K</p>
  </div>

  <div class="card">
    <h3>Premium</h3>
    <p>Rp 1.000K</p>
  </div>
</section>

<section id="contact" class="contact">
  <h2>Contact</h2>

  <a href="https://wa.me/6283894036552">WhatsApp</a>
  <a href="https://www.instagram.com/shine.photostudio_id">Instagram</a>
  <a href="https://www.tiktok.com/@shine.photostudio_id">TikTok</a>
</section>

</body>
</html>
